function applyText(){const x=t[state.lang];$('title').textContent=x.title;$('subtitle').textContent=x.subtitle;$('heroBadge').textContent=x.heroBadge;$('heroTitle').textContent=x.heroTitle;$('heroText').textContent=x.heroText;$('m1k').textContent=x.m1k;$('m1v').textContent=x.m1v;$('m2k').textContent=x.m2k;$('m2v').textContent=x.m2v;$('m3k').textContent=x.m3k;$('m3v').textContent=x.m3v;$('squadLabel').textContent=x.squad;$('nameLabel').textContent=x.name;$('tip').textContent=x.tip;$('s1k').textContent=x.s1;$('s2k').textContent=x.s2;$('s3k').textContent=x.s3;$('s4k').textContent=x.s4;$('weeksHeader').textContent=x.weeks;$('warmHeader').textContent=x.warm;$('ruleHeader').textContent=x.rules;$('mobHeader').textContent=x.mob;$('resetWeek').textContent=x.resetWeek;$('resetAll').textContent=x.resetAll;$('footer').textContent=x.footer;$('lang').textContent=state.lang==='en'?'繁中':'EN';$('playerName').placeholder=state.lang==='en'?'Optional':'可選填';$('warmList').innerHTML=x.warmItems.map(i=>`<li>${i}</li>`).join('');$('ruleList').innerHTML=x.ruleItems.map(i=>`<li>${i}</li>`).join('');$('mobList').innerHTML=x.mobItems.map(i=>`<li>${i}</li>`).join('')}
function renderWeeks(){const x=t[state.lang].weeksData;$('weeks').innerHTML=x.map(w=>`<button class="week ${w[0]===state.week?'active':''}" data-w="${w[0]}"><strong>${w[1]} · ${w[2]}</strong><span>${t[state.lang].phase}: ${w[3]}</span><span>${t[state.lang].note}: ${w[4]}</span></button>`).join('');document.querySelectorAll('[data-w]').forEach(b=>b.onclick=()=>{state.week=b.dataset.w;render()})}
function renderSessions(){const x=t[state.lang].weeksData.find(w=>w[0]===state.week);$('weekNum').textContent=x[1];$('structure').textContent=x[5];$('sessions').innerHTML=ds()[state.week].map((s,si)=>`<section class="session"><div class="sessionHead"><div><div class="badge">${state.lang==='en'?'Session':'課節'} ${s.code}</div><h3 class="sessionTitle">${state.lang==='en'?s.en:s.zh}</h3></div><div class="sub">${t[state.lang].structure}: ${x[5]}</div></div><div class="exerciseList">${s.ex.map((e,ei)=>{const id=`${state.week}:${si}:${ei}`;return `<article class="exercise ${checked(id)?'done':''}"><input type="checkbox" ${checked(id)?'checked':''} data-id="${id}"><div><h4>${state.lang==='en'?e.name.en:e.name.zh}</h4><div class="pills"><span class="pill">${state.lang==='en'?e.pre.en:e.pre.zh}</span><span class="pill">${t[state.lang].cue}: ${state.lang==='en'?e.cue.en:e.cue.zh}</span></div><div class="videos">${e.vids.map(k=>`<div class="videoCard"><div class="videoTitle">${videos[k][0]}</div><div class="videoWrap"><iframe src="${videos[k][1]}" title="${videos[k][0]}" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div></div>`).join('')}</div></div></article>`}).join('')}</div></section>`).join('');document.querySelectorAll('[data-id]').forEach(c=>c.onchange=e=>setCheck(c.dataset.id,e.target.checked))}
function renderSummary(){const total=Object.values(ds()).flat().reduce((a,s)=>a+s.ex.length,0);const done=Object.keys(state.checks).filter(k=>k.startsWith(state.squad+':')&&state.checks[k]).length;const pct=total?Math.round(done/total*100):0;$('overall').textContent=pct+'%';$('bar').style.width=pct+'%';$('doneCount').textContent=`${done} / ${total}`}
function render(){applyText();renderWeeks();renderSessions();renderSummary()}
$('lang').onclick=()=>{state.lang=state.lang==='en'?'zh':'en';render()};$('theme').onclick=()=>{const dark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dark?'light':'dark');$('theme').textContent=dark?'🌙':'☀️'};$('squad').onchange=e=>{state.squad=e.target.value;render()};$('resetWeek').onclick=()=>{const prefix=`${state.squad}:${state.week}:`;Object.keys(state.checks).forEach(k=>{if(k.startsWith(prefix)) delete state.checks[k]});save();render()};$('resetAll').onclick=()=>{state.checks={};save();render()};(function(){const d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light');$('theme').textContent=d?'☀️':'🌙'})();render();
